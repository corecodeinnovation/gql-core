services:
  api:
    build: .
    env_file: .env
    # 3003 en el host → gql.corecodeinnovation.com (el túnel apunta a 3003).
    ports: ["3003:3000"]
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:16-alpine
    environment: { POSTGRES_USER: gql, POSTGRES_PASSWORD: gql, POSTGRES_DB: gqlcore }
    ports: ["5434:5432"]   # 5434 en el host (dev); dentro de compose se usa db:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gql -d gqlcore"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes: ["gqldb:/var/lib/postgresql/data"]
volumes: { gqldb: {} }
