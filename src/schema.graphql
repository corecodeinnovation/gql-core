scalar DateTime

enum TicketStatus {
  OPEN
  IN_PROGRESS
  DONE
  CLOSED
}

enum TicketPriority {
  LOW
  MEDIUM
  HIGH
}

enum OrderDirection {
  ASC
  DESC
}

enum ProjectOrderField {
  CREATED_AT
  NAME
}

enum TicketOrderField {
  CREATED_AT
  PRIORITY
  TITLE
}

type Project {
  id: ID!
  name: String!
  description: String
  createdAt: DateTime!
  tickets(first: Int, after: String, filter: TicketFilter, orderBy: TicketOrder): TicketConnection!
}

type Ticket {
  id: ID!
  title: String!
  description: String
  status: TicketStatus!
  priority: TicketPriority!
  authorSub: String
  createdAt: DateTime!
  project: Project!
}

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

type ProjectEdge {
  node: Project!
  cursor: String!
}

type ProjectConnection {
  edges: [ProjectEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type TicketEdge {
  node: Ticket!
  cursor: String!
}

type TicketConnection {
  edges: [TicketEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

input ProjectFilter {
  search: String
}

input ProjectOrder {
  field: ProjectOrderField!
  direction: OrderDirection!
}

input TicketFilter {
  status: TicketStatus
  priority: TicketPriority
  search: String
}

input TicketOrder {
  field: TicketOrderField!
  direction: OrderDirection!
}

type Query {
  projects(first: Int, after: String, filter: ProjectFilter, orderBy: ProjectOrder): ProjectConnection!
  project(id: ID!): Project
  tickets(first: Int, after: String, filter: TicketFilter, orderBy: TicketOrder): TicketConnection!
}
